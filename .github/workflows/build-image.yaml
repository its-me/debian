name: Build image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-base:
    name: Build base and push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      hash: ${{ steps.exist.outputs.hash }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: debian-base

      - name: Check if image exists in GHCR
        id: exist
        run: |
          hash=$(docker run --rm debian-base dpkg -l | sha256sum | cut -d' ' -f1)
          echo "hash=$hash" >> $GITHUB_OUTPUT
          if docker manifest inspect ghcr.io/${{ github.repository }}:$hash > /dev/null 2>&1; then
            echo "exist=true" >> $GITHUB_OUTPUT
          else
            echo "exist=false" >> $GITHUB_OUTPUT
          fi

      - name: Push image to GHCR
        if: steps.exist.outputs.exist != 'true'
        run: |
          docker tag debian-base ghcr.io/${{ github.repository }}:${{ steps.exist.outputs.hash }}
          docker tag debian-base ghcr.io/${{ github.repository }}:latest
          docker push ghcr.io/${{ github.repository }}:${{ steps.exist.outputs.hash }}
          docker push ghcr.io/${{ github.repository }}:latest

  push-hub-base:
    name: Publish base to Docker Hub
    needs: build-base
    runs-on: ubuntu-latest
    permissions:
      packages: read
    env:
      REPOSITORY: debian
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.HUB_USERNAME }}
          password: ${{ secrets.HUB_TOKEN }}

      - name: Check if image exists in Docker Hub
        id: exist
        run: |
          if docker manifest inspect ${{ secrets.HUB_USERNAME }}/$REPOSITORY:${{ needs.build-base.outputs.hash }} > /dev/null 2>&1; then
            echo "exist=true" >> $GITHUB_OUTPUT
          else
            echo "exist=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish image to Docker Hub
        if: steps.exist.outputs.exist != 'true'
        run: |
          docker buildx imagetools create \
            --tag ${{ secrets.HUB_USERNAME }}/$REPOSITORY:${{ needs.build-base.outputs.hash }} \
            --tag ${{ secrets.HUB_USERNAME }}/$REPOSITORY:latest \
            ghcr.io/${{ github.repository }}:${{ needs.build-base.outputs.hash }}

  push-quay-base:
    name: Publish base to Quay
    needs: build-base
    runs-on: ubuntu-latest
    permissions:
      packages: read
    env:
      REPOSITORY: debian
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Quay
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Check if image exists in Quay
        id: exist
        env:
          QUAY_NAMESPACE: ${{ secrets.QUAY_USERNAME }}
        run: |
          if docker manifest inspect quay.io/${QUAY_NAMESPACE%%+*}/$REPOSITORY:${{ needs.build-base.outputs.hash }} > /dev/null 2>&1; then
            echo "exist=true" >> $GITHUB_OUTPUT
          else
            echo "exist=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish image to Quay
        if: steps.exist.outputs.exist != 'true'
        env:
          QUAY_NAMESPACE: ${{ secrets.QUAY_USERNAME }}
        run: |
          docker buildx imagetools create \
            --tag quay.io/${QUAY_NAMESPACE%%+*}/$REPOSITORY:${{ needs.build-base.outputs.hash }} \
            --tag quay.io/${QUAY_NAMESPACE%%+*}/$REPOSITORY:latest \
            ghcr.io/${{ github.repository }}:${{ needs.build-base.outputs.hash }}

  build-python:
    name: Build python and push to GHCR
    needs: build-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      hash: ${{ steps.exist.outputs.hash }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.python
          load: true
          tags: debian-python

      - name: Check if image exists in GHCR
        id: exist
        run: |
          hash=$(docker run --rm debian-python sh -c 'dpkg -l && python3 --version' | sha256sum | cut -d' ' -f1)
          echo "hash=$hash" >> $GITHUB_OUTPUT
          if docker manifest inspect ghcr.io/${{ github.repository }}:python-$hash > /dev/null 2>&1; then
            echo "exist=true" >> $GITHUB_OUTPUT
          else
            echo "exist=false" >> $GITHUB_OUTPUT
          fi

      - name: Push image to GHCR
        if: steps.exist.outputs.exist != 'true'
        run: |
          docker tag debian-python ghcr.io/${{ github.repository }}:python-${{ steps.exist.outputs.hash }}
          docker tag debian-python ghcr.io/${{ github.repository }}:python
          docker push ghcr.io/${{ github.repository }}:python-${{ steps.exist.outputs.hash }}
          docker push ghcr.io/${{ github.repository }}:python

  push-hub-python:
    name: Publish python to Docker Hub
    needs: build-python
    runs-on: ubuntu-latest
    permissions:
      packages: read
    env:
      REPOSITORY: debian
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.HUB_USERNAME }}
          password: ${{ secrets.HUB_TOKEN }}

      - name: Check if image exists in Docker Hub
        id: exist
        run: |
          if docker manifest inspect ${{ secrets.HUB_USERNAME }}/$REPOSITORY:python-${{ needs.build-python.outputs.hash }} > /dev/null 2>&1; then
            echo "exist=true" >> $GITHUB_OUTPUT
          else
            echo "exist=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish image to Docker Hub
        if: steps.exist.outputs.exist != 'true'
        run: |
          docker buildx imagetools create \
            --tag ${{ secrets.HUB_USERNAME }}/$REPOSITORY:python-${{ needs.build-python.outputs.hash }} \
            --tag ${{ secrets.HUB_USERNAME }}/$REPOSITORY:python \
            ghcr.io/${{ github.repository }}:python-${{ needs.build-python.outputs.hash }}

  push-quay-python:
    name: Publish python to Quay
    needs: build-python
    runs-on: ubuntu-latest
    permissions:
      packages: read
    env:
      REPOSITORY: debian
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Quay
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Check if image exists in Quay
        id: exist
        env:
          QUAY_NAMESPACE: ${{ secrets.QUAY_USERNAME }}
        run: |
          if docker manifest inspect quay.io/${QUAY_NAMESPACE%%+*}/$REPOSITORY:python-${{ needs.build-python.outputs.hash }} > /dev/null 2>&1; then
            echo "exist=true" >> $GITHUB_OUTPUT
          else
            echo "exist=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish image to Quay
        if: steps.exist.outputs.exist != 'true'
        env:
          QUAY_NAMESPACE: ${{ secrets.QUAY_USERNAME }}
        run: |
          docker buildx imagetools create \
            --tag quay.io/${QUAY_NAMESPACE%%+*}/$REPOSITORY:python-${{ needs.build-python.outputs.hash }} \
            --tag quay.io/${QUAY_NAMESPACE%%+*}/$REPOSITORY:python \
            ghcr.io/${{ github.repository }}:python-${{ needs.build-python.outputs.hash }}

  build-uv:
    name: Build uv and push to GHCR
    needs: build-python
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      hash: ${{ steps.exist.outputs.hash }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.uv
          load: true
          tags: debian-uv

      - name: Check if image exists in GHCR
        id: exist
        run: |
          hash=$(docker run --rm debian-uv sh -c 'dpkg -l && uv --version' | sha256sum | cut -d' ' -f1)
          echo "hash=$hash" >> $GITHUB_OUTPUT
          if docker manifest inspect ghcr.io/${{ github.repository }}:uv-$hash > /dev/null 2>&1; then
            echo "exist=true" >> $GITHUB_OUTPUT
          else
            echo "exist=false" >> $GITHUB_OUTPUT
          fi

      - name: Push image to GHCR
        if: steps.exist.outputs.exist != 'true'
        run: |
          docker tag debian-uv ghcr.io/${{ github.repository }}:uv-${{ steps.exist.outputs.hash }}
          docker tag debian-uv ghcr.io/${{ github.repository }}:uv
          docker push ghcr.io/${{ github.repository }}:uv-${{ steps.exist.outputs.hash }}
          docker push ghcr.io/${{ github.repository }}:uv

  push-hub-uv:
    name: Publish uv to Docker Hub
    needs: build-uv
    runs-on: ubuntu-latest
    permissions:
      packages: read
    env:
      REPOSITORY: debian
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.HUB_USERNAME }}
          password: ${{ secrets.HUB_TOKEN }}

      - name: Check if image exists in Docker Hub
        id: exist
        run: |
          if docker manifest inspect ${{ secrets.HUB_USERNAME }}/$REPOSITORY:uv-${{ needs.build-uv.outputs.hash }} > /dev/null 2>&1; then
            echo "exist=true" >> $GITHUB_OUTPUT
          else
            echo "exist=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish image to Docker Hub
        if: steps.exist.outputs.exist != 'true'
        run: |
          docker buildx imagetools create \
            --tag ${{ secrets.HUB_USERNAME }}/$REPOSITORY:uv-${{ needs.build-uv.outputs.hash }} \
            --tag ${{ secrets.HUB_USERNAME }}/$REPOSITORY:uv \
            ghcr.io/${{ github.repository }}:uv-${{ needs.build-uv.outputs.hash }}

  push-quay-uv:
    name: Publish uv to Quay
    needs: build-uv
    runs-on: ubuntu-latest
    permissions:
      packages: read
    env:
      REPOSITORY: debian
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Quay
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Check if image exists in Quay
        id: exist
        env:
          QUAY_NAMESPACE: ${{ secrets.QUAY_USERNAME }}
        run: |
          if docker manifest inspect quay.io/${QUAY_NAMESPACE%%+*}/$REPOSITORY:uv-${{ needs.build-uv.outputs.hash }} > /dev/null 2>&1; then
            echo "exist=true" >> $GITHUB_OUTPUT
          else
            echo "exist=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish image to Quay
        if: steps.exist.outputs.exist != 'true'
        env:
          QUAY_NAMESPACE: ${{ secrets.QUAY_USERNAME }}
        run: |
          docker buildx imagetools create \
            --tag quay.io/${QUAY_NAMESPACE%%+*}/$REPOSITORY:uv-${{ needs.build-uv.outputs.hash }} \
            --tag quay.io/${QUAY_NAMESPACE%%+*}/$REPOSITORY:uv \
            ghcr.io/${{ github.repository }}:uv-${{ needs.build-uv.outputs.hash }}
