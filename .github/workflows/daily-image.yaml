        run: |
          if docker manifest inspect quay.io/${QUAY_NAMESPACE%%+*}/$REPOSITORY:python-${{ needs.build-python.outputs.hash }} > /dev/null 2>&1; then
            echo "exist=true" >> $GITHUB_OUTPUT
          else
            echo "exist=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish image to Quay
        env:
