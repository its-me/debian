          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.HUB_USERNAME }}
          password: ${{ secrets.HUB_TOKEN }}

      - name: Check if image exists in Docker Hub
        id: exist
        run: |
          if docker manifest inspect ${{ secrets.HUB_USERNAME }}/$REPOSITORY:python-${{ needs.build-python.outputs.hash }} > /dev/null 2>&1; then
            echo "exist=true" >> $GITHUB_OUTPUT
          else
            echo "exist=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish image to Docker Hub
        run: |
          date_tag=$(date -u +%y%m%d)
          if [ "${{ steps.exist.outputs.exist }}" != "true" ]; then
            docker buildx imagetools create \
              --tag ${{ secrets.HUB_USERNAME }}/$REPOSITORY:python-${{ needs.build-python.outputs.hash }} \
              ghcr.io/its-me/debian:python-${{ needs.build-python.outputs.hash }}
          fi
          docker buildx imagetools create \
            --tag ${{ secrets.HUB_USERNAME }}/$REPOSITORY:python-$date_tag \
            --tag ${{ secrets.HUB_USERNAME }}/$REPOSITORY:python \
            ghcr.io/its-me/debian:python-${{ needs.build-python.outputs.hash }}

  push-quay-python:
    name: Publish python to Quay
    needs: build-python
    runs-on: ubuntu-latest
    permissions:
      packages: read
    env:
      REPOSITORY: debian
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
