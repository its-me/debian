name: Daily image

on:
  schedule:
    - cron: "0 3 * * *"

jobs:
  build-base:
    name: Build base and push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      hash: ${{ steps.exist.outputs.hash }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: debian-base

      - name: Check if image exists in GHCR
        id: exist
        run: |
          hash=$(docker run --rm debian-base dpkg -l | sha256sum | cut -d' ' -f1)
          echo "hash=$hash" >> $GITHUB_OUTPUT
          if docker manifest inspect ghcr.io/its-me/debian:$hash > /dev/null 2>&1; then
            echo "exist=true" >> $GITHUB_OUTPUT
          else
            echo "exist=false" >> $GITHUB_OUTPUT
          fi

      - name: Push image to GHCR
        run: |
          date_tag=$(date -u +%y%m%d)
          if [ "${{ steps.exist.outputs.exist }}" != "true" ]; then
            docker tag debian-base ghcr.io/its-me/debian:${{ steps.exist.outputs.hash }}
            docker push ghcr.io/its-me/debian:${{ steps.exist.outputs.hash }}
          fi
          docker buildx imagetools create \
            --tag ghcr.io/its-me/debian:$date_tag \
            --tag ghcr.io/its-me/debian:latest \
            ghcr.io/its-me/debian:${{ steps.exist.outputs.hash }}

  push-hub-base:
    name: Publish base to Docker Hub
    needs: build-base
    runs-on: ubuntu-latest
    permissions:
      packages: read
    env:
      REPOSITORY: debian
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.HUB_USERNAME }}
          password: ${{ secrets.HUB_TOKEN }}

      - name: Check if image exists in Docker Hub
        id: exist
        run: |
          if docker manifest inspect ${{ secrets.HUB_USERNAME }}/$REPOSITORY:${{ needs.build-base.outputs.hash }} > /dev/null 2>&1; then
            echo "exist=true" >> $GITHUB_OUTPUT
          else
            echo "exist=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish image to Docker Hub
        run: |
          date_tag=$(date -u +%y%m%d)
          if [ "${{ steps.exist.outputs.exist }}" != "true" ]; then
            docker buildx imagetools create \
              --tag ${{ secrets.HUB_USERNAME }}/$REPOSITORY:${{ needs.build-base.outputs.hash }} \
              ghcr.io/its-me/debian:${{ needs.build-base.outputs.hash }}
          fi
          docker buildx imagetools create \
            --tag ${{ secrets.HUB_USERNAME }}/$REPOSITORY:$date_tag \
            --tag ${{ secrets.HUB_USERNAME }}/$REPOSITORY:latest \
            ghcr.io/its-me/debian:${{ needs.build-base.outputs.hash }}

  push-quay-base:
    name: Publish base to Quay
    needs: build-base
    runs-on: ubuntu-latest
    permissions:
      packages: read
    env:
      REPOSITORY: debian
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Quay
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Check if image exists in Quay
        id: exist
        env:
          QUAY_NAMESPACE: ${{ secrets.QUAY_USERNAME }}
        run: |
          if docker manifest inspect quay.io/${QUAY_NAMESPACE%%+*}/$REPOSITORY:${{ needs.build-base.outputs.hash }} > /dev/null 2>&1; then
            echo "exist=true" >> $GITHUB_OUTPUT
          else
            echo "exist=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish image to Quay
        env:
          QUAY_NAMESPACE: ${{ secrets.QUAY_USERNAME }}
        run: |
          date_tag=$(date -u +%y%m%d)
          if [ "${{ steps.exist.outputs.exist }}" != "true" ]; then
            docker buildx imagetools create \
              --tag quay.io/${QUAY_NAMESPACE%%+*}/$REPOSITORY:${{ needs.build-base.outputs.hash }} \
              ghcr.io/its-me/debian:${{ needs.build-base.outputs.hash }}
          fi
          docker buildx imagetools create \
            --tag quay.io/${QUAY_NAMESPACE%%+*}/$REPOSITORY:$date_tag \
            --tag quay.io/${QUAY_NAMESPACE%%+*}/$REPOSITORY:latest \
            ghcr.io/its-me/debian:${{ needs.build-base.outputs.hash }}

  build-python:
    name: Build python and push to GHCR
    needs: build-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      hash: ${{ steps.exist.outputs.hash }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.python
          load: true
          tags: debian-python

      - name: Check if image exists in GHCR
        id: exist
        run: |
          hash=$(docker run --rm debian-python sh -c 'dpkg -l && python3 --version' | sha256sum | cut -d' ' -f1)
          echo "hash=$hash" >> $GITHUB_OUTPUT
          if docker manifest inspect ghcr.io/its-me/debian:python-$hash > /dev/null 2>&1; then
            echo "exist=true" >> $GITHUB_OUTPUT
          else
            echo "exist=false" >> $GITHUB_OUTPUT
          fi

      - name: Push image to GHCR
        run: |
          date_tag=$(date -u +%y%m%d)
          if [ "${{ steps.exist.outputs.exist }}" != "true" ]; then
            docker tag debian-python ghcr.io/its-me/debian:python-${{ steps.exist.outputs.hash }}
            docker push ghcr.io/its-me/debian:python-${{ steps.exist.outputs.hash }}
          fi
          docker buildx imagetools create \
            --tag ghcr.io/its-me/debian:python-$date_tag \
            --tag ghcr.io/its-me/debian:python \
            ghcr.io/its-me/debian:python-${{ steps.exist.outputs.hash }}

  push-hub-python:
    name: Publish python to Docker Hub
    needs: build-python
    runs-on: ubuntu-latest
    permissions:
      packages: read
    env:
      REPOSITORY: debian
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
