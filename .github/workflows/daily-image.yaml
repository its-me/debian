        run: |
          date_tag=$(date -u +%y%m%d)
          if [ "${{ steps.exist.outputs.exist }}" != "true" ]; then
            docker buildx imagetools create \
              --tag quay.io/${QUAY_NAMESPACE%%+*}/$REPOSITORY:python-${{ needs.build-python.outputs.hash }} \
              ghcr.io/its-me/debian:python-${{ needs.build-python.outputs.hash }}
          fi
          docker buildx imagetools create \
            --tag quay.io/${QUAY_NAMESPACE%%+*}/$REPOSITORY:python-$date_tag \
            --tag quay.io/${QUAY_NAMESPACE%%+*}/$REPOSITORY:python \
            ghcr.io/its-me/debian:python-${{ needs.build-python.outputs.hash }}

  build-uv:
    name: Build uv and push to GHCR
    needs: build-python
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      hash: ${{ steps.exist.outputs.hash }}
    steps:
      - name: Checkout repository
